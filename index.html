<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kannada Voice Generator</title>

<style>
body {
  background: #0f0f14;
  color: white;
  font-family: Arial;
  text-align: center;
  padding: 40px;
}

h1 {
  color: #e8be6a;
}

textarea {
  width: 90%;
  height: 150px;
  border-radius: 10px;
  border: none;
  padding: 15px;
  font-size: 18px;
  margin-top: 20px;
}

select, button {
  padding: 10px 20px;
  margin: 10px;
  border-radius: 8px;
  border: none;
  font-size: 16px;
  cursor: pointer;
}

button {
  background: #e8be6a;
}

.status {
  margin-top: 15px;
  color: #aaa;
}

.voice-list {
  margin-top: 20px;
  font-size: 12px;
  color: #ccc;
  max-height: 120px;
  overflow: auto;
}
</style>

</head>
<body>

<h1>🎙 Kannada Text to Speech</h1>

<textarea id="text" placeholder="ಇಲ್ಲಿ ನಿಮ್ಮ ಕನ್ನಡ ಪಾಠವನ್ನು ಬರೆಯಿರಿ..."></textarea>

<br>

<select id="emotion">
  <option value="normal">Normal</option>
  <option value="happy">Happy 😊</option>
  <option value="sad">Sad 😢</option>
  <option value="excited">Excited 🎉</option>
</select>

<br>

<button onclick="speak()">▶ Speak</button>
<button onclick="pause()">⏸ Pause</button>
<button onclick="resume()">▶ Resume</button>
<button onclick="stop()">⏹ Stop</button>

<button onclick="showVoices()">🔍 Show Voices</button>

<div class="status" id="status"></div>

<div class="voice-list" id="voiceList"></div>

<script>
let utterance;

// Emotion settings
function getEmotionSettings(emotion) {
  switch (emotion) {
    case "happy": return { rate: 1.1, pitch: 1.4 };
    case "sad": return { rate: 0.8, pitch: 0.7 };
    case "excited": return { rate: 1.2, pitch: 1.6 };
    default: return { rate: 1, pitch: 1 };
  }
}

// Get Kannada voice
function getKannadaVoice() {
  const voices = speechSynthesis.getVoices();

  let voice = voices.find(v => v.lang === "kn-IN");

  if (!voice) {
    voice = voices.find(v => v.lang.toLowerCase().includes("kn"));
  }

  return voice;
}

// Speak function
function speak() {
  const text = document.getElementById("text").value;
  const emotion = document.getElementById("emotion").value;

  if (!text) {
    alert("Please enter Kannada text");
    return;
  }

  const synth = window.speechSynthesis;
  synth.cancel();

  utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = "kn-IN";

  const voice = getKannadaVoice();

  if (!voice) {
    document.getElementById("status").innerText =
      "⚠️ Kannada voice not found. Install Kannada language in system.";
  } else {
    utterance.voice = voice;
  }

  const settings = getEmotionSettings(emotion);
  utterance.rate = settings.rate;
  utterance.pitch = settings.pitch;

  utterance.onstart = () => {
    document.getElementById("status").innerText = "Speaking...";
  };

  utterance.onend = () => {
    document.getElementById("status").innerText = "Completed ✅";
  };

  synth.speak(utterance);
}

// Controls
function pause() {
  speechSynthesis.pause();
}

function resume() {
  speechSynthesis.resume();
}

function stop() {
  speechSynthesis.cancel();
}

// Debug: show voices
function showVoices() {
  const voices = speechSynthesis.getVoices();
  const list = document.getElementById("voiceList");

  list.innerHTML = "<b>Available Voices:</b><br>";

  voices.forEach(v => {
    list.innerHTML += `${v.name} (${v.lang})<br>`;
  });
}

// Load voices
speechSynthesis.onvoiceschanged = () => {
  speechSynthesis.getVoices();
};
</script>

</body>
</html>
