<!DOCTYPE html>
<html>
<head>
<title>Kannada AI Voice</title>
</head>
<body style="text-align:center;padding:40px;font-family:sans-serif">

<h2>🎙 Kannada AI Voice Generator</h2>

<textarea id="text" style="width:80%;height:120px"></textarea>

<br><br>

<button onclick="generate()">Generate Voice</button>
<button onclick="download()">Download</button>

<br><br>

<audio id="audio" controls></audio>

<script>
let blobData;

async function generate() {
  const text = document.getElementById("text").value;

  if (!text) {
    alert("Enter Kannada text");
    return;
  }

  const res = await fetch("/.netlify/functions/tts", {
    method: "POST",
    body: JSON.stringify({ text })
  });

  const blob = await res.blob();
  blobData = blob;

  const url = URL.createObjectURL(blob);
  document.getElementById("audio").src = url;
}

function download() {
  if (!blobData) {
    alert("Generate first");
    return;
  }

  const url = URL.createObjectURL(blobData);
  const a = document.createElement("a");
  a.href = url;
  a.download = "voice.mp3";
  a.click();
}
</script>

</body>
</html>
