<!DOCTYPE html>
<html>
<head>
<title>Kannada AI Voice</title>
</head>
<body style="background:black;color:white;font-family:sans-serif;text-align:center;padding:40px">

<h1>🎙 Kannada AI Voice Generator</h1>

<textarea id="text" placeholder="Enter Kannada text..." style="width:90%;height:150px"></textarea>
<br><br>

<select id="emotion">
  <option value="happy">Happy</option>
  <option value="sad">Sad</option>
  <option value="romantic">Romantic</option>
  <option value="excited">Excited</option>
</select>

<br><br>

<button onclick="generate()">Generate Voice</button>
<button onclick="download()">Download</button>

<br><br>

<audio id="audio" controls></audio>

<script>
let audioBlob = null;

async function generate() {
  const text = document.getElementById("text").value;
  const emotion = document.getElementById("emotion").value;

  if (!text) {
    alert("Enter text");
    return;
  }

  const res = await fetch("/.netlify/functions/tts", {
    method: "POST",
    body: JSON.stringify({ text, emotion })
  });

  const blob = await res.blob();
  audioBlob = blob;

  const url = URL.createObjectURL(blob);
  document.getElementById("audio").src = url;
}

function download() {
  if (!audioBlob) {
    alert("Generate first");
    return;
  }

  const url = URL.createObjectURL(audioBlob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "kannada-voice.mp3";
  a.click();
}
</script>

</body>
</html>
